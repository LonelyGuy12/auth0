name: auth0
description: "AI Agent Desktop - Powered by Auth0 Token Vault"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.1
  http: ^1.2.0
  url_launcher: ^6.2.0
  flutter_secure_storage: ^9.0.0
  flutter_markdown: ^0.6.18
  google_fonts: ^6.1.0
  animate_do: ^3.1.2
  flutter_dotenv: ^5.1.0
  uuid: ^4.2.1
  speech_to_text: ^7.3.0
  tray_manager: ^0.5.0
  window_manager: ^0.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/.env
    - assets/tray_icon.png
